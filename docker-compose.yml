services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: aisolutioncrm
      POSTGRES_PASSWORD: aisolutioncrm_dev_pw
      POSTGRES_DB: aisolutioncrm_dev
    ports:
      - "5433:5432"
    volumes:
      - crm_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aisolutioncrm -d aisolutioncrm_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://aisolutioncrm:aisolutioncrm_dev_pw@postgres:5432/aisolutioncrm_dev
      JWT_SECRET: dev-secret-change-me
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  crm_postgres_data:
